gui:
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - '#cba6f7'
      - bold
    inactiveBorderColor:
      - '#a6adc8'
    optionsTextColor:
      - '#89b4fa'
    selectedLineBgColor:
      - '#313244'
    cherryPickedCommitBgColor:
      - '#45475a'
    cherryPickedCommitFgColor:
      - '#cba6f7'
    unstagedChangesColor:
      - red
    defaultFGColor:
      - '#cdd6f4'

git:
  paging:
    colorArg: always
    pager: delta --dark --paging=never

os:
  editPreset: nvim
