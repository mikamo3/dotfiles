[manager]
ratio = [1, 3, 4]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = false
show_symlink = true

[preview]
tab_size = 2
max_width = 600
max_height = 900
image_filter = "triangle"
image_quality = 75

[opener]
edit = [
  { run = 'nvim "$@"', block = true, desc = "nvim" },
]
open = [
  { run = 'xdg-open "$@"', desc = "Open" },
]
play = [
  { run = 'mpv --quiet "$@"', orphan = true, desc = "mpv" },
]

[open]
rules = [
  { mime = "text/*", use = "edit" },
  { mime = "image/*", use = "open" },
  { mime = "video/*", use = "play" },
  { mime = "audio/*", use = "play" },
  { mime = "*", use = "open" },
]
