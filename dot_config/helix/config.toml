theme = "catppuccin_mocha"

[editor]
line-number = "relative"
mouse = true
auto-save = false
completion-trigger-len = 1
idle-timeout = 200
color-modes = true
bufferline = "multiple"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false
git-ignore = true

[editor.statusline]
left = ["mode", "spinner", "file-name", "file-modification-indicator"]
center = []
right = ["diagnostics", "selections", "position", "file-encoding", "file-type"]
separator = "│"

[editor.indent-guides]
render = true
character = "╎"

[editor.lsp]
display-inlay-hints = true
display-messages = true

[editor.soft-wrap]
enable = false

[keys.normal]
# Buffer navigation
"{" = ":buffer-previous"
"}" = ":buffer-next"
"X" = "extend_line_above"
# Space menu extensions
space.q = ":buffer-close"
space.Q = ":buffer-close!"

[keys.insert]
"j" = { j = "normal_mode" }
