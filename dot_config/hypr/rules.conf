##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# "Smart gaps" / "No gaps when only"
# Uncomment to enable no gaps when only one window is on workspace
#workspace = w[tv1], gapsin:0, gapsout:0
#workspace = f[1], gapsin:0, gapsout:0
#windowrule = border_size 0, match:float 0, match:workspace w[tv1]
#windowrule = rounding 0, match:float 0, match:workspace w[tv1]
#windowrule = border_size 0, match:float 0, match:workspace f[1]
#windowrule = rounding 0, match:float 0, match:workspace f[1]

# Application-specific rules
windowrule = tile on, match:class Chromium

# 1Password
windowrule = workspace special, match:class 1password
windowrule = float on, match:class 1password
windowrule = center on, match:class 1password

# File Roller
windowrule = float on, match:class org.gnome.FileRoller
windowrule = center on, match:class org.gnome.FileRoller

# Blueman Manager
windowrule = float on, match:class blueman-manager
windowrule = center on, match:class blueman-manager
windowrule = size (monitor_w*0.5) (monitor_h*0.7), match:class blueman-manager

# Remmina
windowrule = workspace 4, match:class org.remmina.Remmina

# VSCode specific rules
windowrule = center on, match:class Code, match:float 1
windowrule = suppress_event maximize, match:class Code
windowrule = tile on, match:class Code

# Workspace assignments
workspace = 1, monitor:desc:LG Electronics LG HDR WQHD, default:true

# Application auto-placement (uncomment to enable)
#windowrule = workspace 1, match:class (firefox|chromium)
#windowrule = workspace 2, match:class (code|neovim)
#windowrule = workspace 3, match:class (discord|slack)

# Fix XWayland transparency issues (especially for Chromium context menus)
windowrule = opaque on, match:xwayland 1

# Ignore maximize requests from apps (uncomment if needed)
#windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland (uncomment if needed)
#windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1

# モーダルダイアログを自動でフロート・中央配置
windowrule = float on, match:modal 1
windowrule = center on, match:modal 1

# xdg-desktop-portal (ファイル選択ダイアログ等)
windowrule = float on, match:class xdg-desktop-portal-gtk
windowrule = center on, match:class xdg-desktop-portal-gtk
windowrule = size (monitor_w*0.5) (monitor_h*0.8), match:class xdg-desktop-portal-gtk

# 通知デーモン（swaync） - Layer Shell用のルール
layerrule = blur off, match:namespace swaync-notification-window
layerrule = blur off, match:namespace swaync-control-center

xwayland {
    force_zero_scaling = true
}
