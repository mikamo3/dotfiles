#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &

# 基本アプリケーション
exec-once = waybar
exec-once = cliphist wipe
exec-once = ~/.config/hypr/wallpaper.sh

# クリップボード管理（1Passwordなど特定ウィンドウをフィルタ）
exec-once = wl-paste --type text --watch ~/.config/hypr/cliphist_filter.sh
exec-once = wl-paste --type image --watch cliphist store

exec-once = systemctl --user start hypridle.service
exec-once = systemctl --user start hyprpaper.service  
exec-once = systemctl --user start hyprpolkitagent.service
# kanshiは無効化（Hyprlandが直接モニタを管理）
# exec-once = systemctl --user start kanshi.service
